backend:
  name: git-gateway
  branch: main

media_folder: "assets/uploads"
public_folder: "/assets/uploads"

slug:
  encoding: "ascii"
  clean_accents: true
  sanitize_replacement: "-"

collections:
  - name: "gallery"
    label: "Production Floor Items"
    folder: "data/gallery"
    create: true
    slug: "{{slug}}"
    format: "json"
    fields:
      - {label: "Project Title", name: "title", widget: "string"}
      - {label: "Craft Type", name: "type", widget: "select", options: ["UV Printing", "Inner Crystal", "Laser Work", "3D Printing"]}
      - {label: "Project Image File", name: "image", widget: "image"}
