backend:
  name: github
  repo: mukulsachdeva-cloud/craftwithlaser-web
  branch: main
 auth_type: implicit
 app_id: 9c210becb8f0ea3c5d1ac031ad31ae682f808fb2

media_folder: "assets/uploads"
public_folder: "/assets/uploads"

slug:
  encoding: "ascii"
  clean_accents: true
  sanitize_replacement: "-"

collections:
  - name: "galleries"
    label: "1. Manage Gallery Categories"
    folder: "data/categories"
    create: true
    slug: "{{slug}}"
    format: "json"
    fields:
      - {label: "Gallery Section ID (lowercase, no spaces)", name: "id", widget: "string"}
      - {label: "Display Title (e.g., Laser Work)", name: "title", widget: "string"}
      - {label: "Description/Subtitle", name: "description", widget: "string"}

  - name: "gallery_items"
    label: "2. Upload Gallery Items"
    folder: "data/gallery"
    create: true
    slug: "{{slug}}"
    format: "json"
    fields:
      - {label: "Project Name", name: "title", widget: "string"}
      - {label: "Belongs to Gallery Category", name: "category", widget: "relation", collection: "galleries", search_fields: ["title"], value_field: "id", display_fields: ["title"]}
      - label: "Project Photos"
        name: "images"
        widget: "list"
        summary: "{{fields.image}}"
        field: {label: "Photo", name: "image", widget: "image"}
